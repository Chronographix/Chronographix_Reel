name: Chronographix Auto-Post

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - name: Recuperer le code
      uses: actions/checkout@v4

    - name: Installer Piper TTS
      run: |
        Remove-Item -Recurse -Force piper -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Path piper | Out-Null
        $piperUrl = "https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_windows_amd64.zip"
        $maxRetries = 3
        $attempt = 0
        do {
          $attempt++
          Write-Host "Tentative $attempt/$maxRetries..."
          try {
            Invoke-WebRequest -Uri $piperUrl -OutFile piper_release.zip -TimeoutSec 120
            break
          } catch {
            Write-Host "Echec : $_"
            if ($attempt -ge $maxRetries) { exit 1 }
            Start-Sleep -Seconds 30
          }
        } while ($true)
        Expand-Archive -Path piper_release.zip -DestinationPath piper_extracted -Force
        Copy-Item -Path "piper_extracted\piper\*" -Destination "piper\" -Recurse -Force
        Remove-Item piper_release.zip, piper_extracted -Recurse -Force
      shell: pwsh

    - name: Telecharger les voix Piper
      run: |
        New-Item -ItemType Directory -Path "piper\voices" -Force | Out-Null
        $base = "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US"
        $voices = @("ryan/high/en_US-ryan-high", "lessac/high/en_US-lessac-high")
        foreach ($v in $voices) {
          $name = $v.Split("/")[-1]
          Invoke-WebRequest -Uri "$base/$v.onnx"      -OutFile "piper\voices\$name.onnx"
          Invoke-WebRequest -Uri "$base/$v.onnx.json" -OutFile "piper\voices\$name.onnx.json"
        }
      shell: pwsh

    - name: Installer ffmpeg
      run: |
        choco install ffmpeg -y
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        ffmpeg -version
      shell: pwsh

    - name: Installer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installer les dependances
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy Pillow moviepy==1.0.3 tqdm openai-whisper

    - name: Delai aleatoire anti-bot (0 a 20 minutes)
      if: github.event_name == 'schedule'
      run: |
        $delay = Get-Random -Minimum 0 -Maximum 1200
        $minutes = [math]::Floor($delay / 60)
        $seconds = $delay % 60
        Write-Host "Delai tire au sort : ${minutes}m ${seconds}s"
        Start-Sleep -Seconds $delay
      shell: pwsh

    - name: Publier une video
      env:
        IG_TOKEN: ${{ secrets.IG_TOKEN }}
        IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
        PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
        CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        PYTHONIOENCODING: utf8
        PYTHONUNBUFFERED: "1"
      run: python -u chronographix_reel_safe_github.py
